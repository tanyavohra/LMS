<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared/site.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="page-content">
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <div class="header">
                <a href="/index.html"><img src="images/home.png" alt="Home" class="profile-pic"></a>
                <div class="header-icons">
                    <i class="fa fa-comment"></i>
                    <i class="fa fa-ellipsis-v"></i>
                </div>
            </div>
            <div class="search">
                <div class="search-container">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Search or start new chat" id="search-input">
                </div>
            </div>
            <div class="contacts" id="contacts">
                <!-- Contacts will be dynamically added here -->
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat">
            <div class="chat-header">
                <img src="images/user.png" alt="Contact Picture" class="profile-pic" id="chat-profile-pic">
                <div class="chat-info">
                    <h3 id="chat-name">Select a chat</h3>
                    <p id="chat-status"></p>
                </div>
                <div class="chat-header-icons">
                    <i class="fa fa-search"></i>
                    <i class="fa fa-ellipsis-v"></i>
                </div>
            </div>
            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be dynamically added here -->
            </div>
            <div class="chat-input">
                <i class="fa fa-smile"></i>
                <input type="text" placeholder="Type a message" id="message-input" disabled>
                <i class="fa fa-paper-plane" id="send-button"></i>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/include.js"></script>
</body>
</html>
