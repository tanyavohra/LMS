<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../shared/site.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="site-header"></div>

    <main class="page-content">
      <div class="page">
        <div class="report">
          <div class="heading">DASHBOARD</div>
          <div class="sub_heading">SYLLABUS</div>
          <div class="division1">
            <div class="head1">ENGLISH</div>
            <div class="head2">GRADE : A</div>
            <div class="progress" style="height: 16px">
              <div class="progress-bar" style="width: 30%"></div>
            </div>
            <div class="head3">REMARK : EXCELLENT</div>
          </div>

          <div class="division2">
            <div class="head1">HINDI</div>
            <div class="head2">GRADE : B</div>
            <div class="progress" style="height: 16px">
              <div class="progress-bar" style="width: 40%"></div>
            </div>
            <div class="head3">REMARK : AVERAGE</div>
          </div>

          <div class="division3">
            <div class="head1">MATHEMATICS</div>
            <div class="head2">GRADE : A+</div>
            <div class="progress" style="height: 16px">
              <div class="progress-bar" style="width: 60%"></div>
            </div>
            <div class="head3">REMARK : GREAT</div>
          </div>
        </div>
        <div class="profile">
          <div class="box2">
            <img src="images/parentpic.jpg" id="parentprofile" alt="Parent profile" />
            <div class="d-flex flex-column justify-content-around">
              <div class="p-2">
                NAME
                <div class="entry">
                  <h1>Vidya Sharma</h1>
                </div>
              </div>
              <div class="p-2">
                AGE
                <div class="entry">
                  <h1>44</h1>
                </div>
              </div>
              <div class="p-2">
                E-MAIL
                <div class="entry">
                  <h1>vidyasharma23@xyz.com</h1>
                </div>
              </div>
              <div class="p-2">
                ADDRESS
                <div class="entry">
                  <h1>HN-369,Jagatpura Jaipur Rajasthan 324006</h1>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/include.js"></script>
</body>
</html>
